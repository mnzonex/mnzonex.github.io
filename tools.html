    <style>
        .page-header {
            padding: 150px 0 60px;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, var(--primary-glow), transparent 70%);
        }

        /* Filter Controls */
        .filter-controls {
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: #fff;
        }

        .filter-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 18px;
        }

            { name: "Word Frequency", desc: "Analyze the most frequently used words in text.", icon: "fa-solid fa-chart-simple", link: "tools/word-freq.html", cat: "Content" },
            { name: "Date Diff", desc: "Count days, weeks, and months between two dates.", icon: "fa-solid fa-calendar-alt", link: "tools/date-diff.html", cat: "Utilities" },
            { name: "Text to Speech", desc: "Convert your written text into spoken audio.", icon: "fa-solid fa-volume-high", link: "tools/tts.html", cat: "Content" },
            { name: "Speech to Text", desc: "Transcribe your spoken voice into written text.", icon: "fa-solid fa-microphone", link: "tools/stt.html", cat: "Content" },
            { name: "Coin Flipper", desc: "A simple virtual coin toss for quick decisions.", icon: "fa-solid fa-coins", link: "tools/coin.html", cat: "Utilities" },
            { name: "Dice Roller", desc: "Roll virtual dice for board games and luck.", icon: "fa-solid fa-dice", link: "tools/dice.html", cat: "Utilities" },
            { name: "List Shuffler", desc: "Randomly reorder any list of items instantly.", icon: "fa-solid fa-list-ol", link: "tools/shuffle.html", cat: "Utilities" },
            { name: "Dupe Remover", desc: "Find and remove duplicate lines from your text.", icon: "fa-solid fa-broom", link: "tools/dupe.html", cat: "Content" },
            { name: "Text Sorter", desc: "Alphabetize and sort lines in text blocks.", icon: "fa-solid fa-sort-alpha-down", link: "tools/sort.html", cat: "Content" },
            { name: "Space Cleaner", desc: "Remove extra spaces and formatting from text.", icon: "fa-solid fa-eraser", link: "tools/spaces.html", cat: "Content" },
            { name: "URL Encoder", desc: "Encode or decode URLs for safe web sharing.", icon: "fa-solid fa-link-slash", link: "tools/url.html", cat: "Developer" },
            { name: "HTML Entities", desc: "Convert special characters to HTML entity codes.", icon: "fa-solid fa-file-code", link: "tools/entities.html", cat: "Developer" },
            { name: "Metronome", desc: "Simple rhythm tool with adjustable BPM speeds.", icon: "fa-solid fa-drum", link: "tools/metronome.html", cat: "Utilities" },
            { name: "Tally Counter", desc: "Simple digital clicker to count anything on screen.", icon: "fa-solid fa-plus-minus", link: "tools/counter.html", cat: "Utilities" },
            { name: "Grid Builder", desc: "Visual tool to create and preview CSS Grid layouts.", icon: "fa-solid fa-table-cells", link: "tools/grid.html", cat: "Design" },
            { name: "Flexbox Pro", desc: "Interactive playground for CSS Flexbox designs.", icon: "fa-solid fa-object-group", link: "tools/flexbox.html", cat: "Design" },
            { name: "Image Filter", desc: "Apply CSS filters like blur and grayscale to images.", icon: "fa-solid fa-wand-magic", link: "tools/filters.html", cat: "Design" },
            { name: "Contrast Check", desc: "Check text readability and color contrast ratios.", icon: "fa-solid fa-eye", link: "tools/contrast.html", cat: "Design" },
            { name: "Privacy Gen", desc: "Basic template for privacy policy documents.", icon: "fa-solid fa-user-shield", link: "tools/privacy.html", cat: "Utilities" },
            { name: "Terms Gen", desc: "Standard template for Terms and Conditions docs.", icon: "fa-solid fa-scale-balanced", link: "tools/terms.html", cat: "Utilities" },
            { name: "Sitemap Gen", desc: "Generate basic XML sitemap structures for SEO.", icon: "fa-solid fa-sitemap", link: "tools/sitemap.html", cat: "Developer" }
        ];

        let currentCategory = 'All';
        const container = document.getElementById("tools-container");

        function renderTools(filteredTools) {
            let html = "";
            if (filteredTools.length === 0) {
                container.innerHTML = `<div class="no-results">No tools found matching your search.</div>`;
                return;
            }
            filteredTools.forEach((t, index) => {
                const delay = index * 0.03;
                html += `
                    <div class="tool-card reveal-on-scroll" style="transition-delay: ${delay}s">
                        <div class="tool-info">
                            <i class="${t.icon}" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
                            <h4>${t.name}</h4>
                            <p>${t.desc}</p>
                            <a href="${t.link}" class="tool-btn">Open Tool</a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // Re-trigger reveal animation for newly added tools
            if (typeof reveal === 'function') {
                setTimeout(reveal, 50);
            }
        }

        function filterTools() {
            const query = document.getElementById('toolSearch').value.toLowerCase();
            const filtered = tools.filter(t => {
                const matchesSearch = t.name.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query);
                const matchesCat = currentCategory === 'All' || t.cat === currentCategory;
                return matchesSearch && matchesCat;
            });
            renderTools(filtered);
        }

        function setCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterTools();
        }

        // Initial render
        renderTools(tools);
    </script>
