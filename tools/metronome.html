    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .bpm-display {
            font-size: 80px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 20px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            margin-bottom: 30px;
        }

        .btn-play {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #fff;
            color: #000;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .indicator {
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            margin: 20px auto;
            transition: 0.1s;
        }

        .indicator.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-drum"></i> Metronome</h1>
        <div class="bpm-display" id="bpm">120</div>
        <p style="color:var(--text-muted); margin-bottom:10px">BPM</p>
        <input type="range" id="tempo" min="40" max="240" value="120" oninput="updateBPM()">
        <div class="indicator" id="indicator"></div>
        <button class="btn-play" id="playBtn" onclick="toggle()"><i class="fa-solid fa-play"></i></button>
    </div>
    <script>
        let isPlaying = false;
        let timer;
        const bpmEl = document.getElementById('bpm');
        const tempoInput = document.getElementById('tempo');
        const playBtn = document.getElementById('playBtn');
        const indicator = document.getElementById('indicator');

        function updateBPM() {
            bpmEl.innerText = tempoInput.value;
            if (isPlaying) { stop(); start(); }
        }

        function toggle() {
            if (isPlaying) stop();
            else start();
        }

        function start() {
            isPlaying = true;
            playBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            const ms = 60000 / tempoInput.value;
            timer = setInterval(() => {
                indicator.classList.add('active');
                setTimeout(() => indicator.classList.remove('active'), 50);
                // Audio beep can be added here
            }, ms);
        }

        function stop() {
            isPlaying = false;
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            clearInterval(timer);
        }
    </script>
</body>
