    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            justify-content: center;
        }

        input[type="number"] {
            width: 80px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            text-align: center;
        }

        .result-area {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #ccc;
            padding: 20px;
            font-family: inherit;
            line-height: 1.6;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .btn-tool {
            padding: 12px 30px;
            background: var(--primary);
            color: #000;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-tool:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-align-left"></i> Lorem Ipsum Generator</h1>
        <div class="controls">
            <span style="color: var(--text-muted);">Paragraphs:</span>
            <input type="number" id="paras" value="3" min="1" max="10">
            <button class="btn-tool" onclick="generate()">Generate</button>
        </div>
        <div class="result-area" id="result">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et
            dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex
            ea commodo consequat.
        </div>
        <button class="btn-tool"
            style="width: 100%; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);"
            onclick="copy()">Copy Text</button>
    </div>

    <script>
        const textBank = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam non finibus erat. Mauris quis urna sit amet tellus eleifend viverra. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Sed vitae massa sit amet augue consectetur gravida. Proin scelerisque urna at felis tincidunt, quis viverra enim gravida. Integer nec sapien sem. Quisque vitae nisl nec purus gravida accumsan. Cras at libero sed est mollis elementum. Etiam pharetra, tellus vel elementum varius, nisi ante sollicitudin felis, vel cursus elit mi ut justo. Curabitur sed lectus sed diam tempor feugiat. Sed euismod, libero vel tincidunt eleifend, massa purus gravida nisl, sed fermentum lectus mi in augue. Phasellus ut odio vel nisl molestie vulputate. Quisque tristique velit in est feugiat, non sollicitudin quam pretium. Maecenas commodo tellus eu elit placerat porttitor. Suspendisse eu congue ante. ";

        function generate() {
            const count = parseInt(document.getElementById('paras').value);
            let result = "";
            for (let i = 0; i < count; i++) {
                result += "<p>" + textBank.repeat(Math.floor(Math.random() * 2) + 1) + "</p><br>";
            }
            document.getElementById('result').innerHTML = result;
        }

        function copy() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
        }
    </script>
</body>
