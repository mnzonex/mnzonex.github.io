    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .count-display {
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-main {
            width: 100%;
            height: 100px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 30px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0 #00aa5d;
            transition: 0.1s;
        }

        .btn-main:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #00aa5d;
        }

        .btn-secondary {
            margin-top: 25px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-plus-minus"></i> Tally Counter</h1>
        <div class="count-display" id="count">0</div>
        <button class="btn-main" onclick="add()">COUNT +1</button>
        <button class="btn-secondary" onclick="reset()">Reset</button>
    </div>
    <script>
        let count = 0;
        function add() {
            count++;
            document.getElementById('count').innerText = count;
        }
        function reset() {
            count = 0;
            document.getElementById('count').innerText = count;
        }
    </script>
</body>
