    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        .password-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            position: relative;
            word-break: break-all;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options {
            text-align: left;
            margin-bottom: 25px;
        }

        .option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--primary);
        }

        .btn-gen {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gen:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .copy-hint {
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
            margin-top: 10px;
            display: block;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-key"></i> Password Generator</h1>
        <div class="password-display" id="passwordResult">Click Generate</div>
        <span class="copy-hint" id="copyHint">Click above to copy</span>
        <div class="options">
            <div class="option">
                <label>Length: <span id="lengthVal">16</span></label>
                <input type="range" id="lengthSlider" min="8" max="50" value="16">
            </div>
            <div class="option">
                <label>Include Uppercase</label>
                <input type="checkbox" id="upperCheck" checked>
            </div>
            <div class="option">
                <label>Include Numbers</label>
                <input type="checkbox" id="numCheck" checked>
            </div>
            <div class="option">
                <label>Include Symbols</label>
                <input type="checkbox" id="symCheck" checked>
            </div>
        </div>
        <button class="btn-gen" id="generateBtn">Generate Secure Password</button>
    </div>

    <script>
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const generateBtn = document.getElementById('generateBtn');
        const passwordResult = document.getElementById('passwordResult');
        const copyHint = document.getElementById('copyHint');

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
        });

        const chars = {
            lower: 'abcdefghijklmnopqrstuvwxyz',
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            num: '0123456789',
            sym: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        function generate() {
            let charset = chars.lower;
            if (document.getElementById('upperCheck').checked) charset += chars.upper;
            if (document.getElementById('numCheck').checked) charset += chars.num;
            if (document.getElementById('symCheck').checked) charset += chars.sym;

            let password = "";
            for (let i = 0; i < lengthSlider.value; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            passwordResult.textContent = password;
        }

        generateBtn.addEventListener('click', generate);

        passwordResult.addEventListener('click', () => {
            if (passwordResult.textContent === 'Click Generate') return;
            navigator.clipboard.writeText(passwordResult.textContent).then(() => {
                copyHint.textContent = 'Copied!';
                setTimeout(() => copyHint.textContent = 'Click above to copy', 2000);
            });
        });
    </script>
</body>
