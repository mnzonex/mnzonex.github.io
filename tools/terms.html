<head>

  <!-- Favicon & App Icons -->
  <link rel="icon" type="image/x-icon" href="../assets/images/branding/mnzonex-favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/branding/mnzonex-favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/branding/mnzonex-favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-family: inherit;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            margin-top: 25px;
        }

        .btn-tool {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-scale-balanced"></i> Terms & Conditions Gen</h1>
        <div class="input-group">
            <label>Company Name</label>
            <input type="text" id="compName" placeholder="e.g. MN ZONEX Corp">
        </div>
        <div class="input-group">
            <label>Website Name</label>
            <input type="text" id="webName" placeholder="e.g. MN ZONEX">
        </div>
        <button class="btn-tool" onclick="genTerms()">Generate Terms</button>
        <textarea id="output" readonly></textarea>
    </div>
    <script>
        function genTerms() {
            const comp = document.getElementById('compName').value || "[Company]";
            const name = document.getElementById('webName').value || "[Website Name]";
            const date = new Date().toLocaleDateString();

            const text = `Terms and Conditions for ${name}
            
These terms and conditions outline the rules and regulations for the use of ${comp}'s Website, located at ${name}.

By accessing this website we assume you accept these terms and conditions. Do not continue to use ${name} if you do not agree to take all of the terms and conditions stated on this page.

License
Unless otherwise stated, ${comp} and/or its licensors own the intellectual property rights for all material on ${name}. All intellectual property rights are reserved.

User Comments
This Agreement shall begin on the date hereof: ${date}.
Parts of this website offer an opportunity for users to post and exchange opinions and information in certain areas of the website. ${comp} does not filter, edit, publish or review Comments prior to their presence on the website.

Disclaimer
To the maximum extent permitted by applicable law, we exclude all representations, warranties and conditions relating to our website and the use of this website.`;
            document.getElementById('output').value = text;
        }
    </script>
</body>

</html>
