    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 25px;
            font-family: inherit;
            resize: none;
            font-size: 18px;
            line-height: 1.6;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-note-sticky"></i> Quick Notes</h1>
        <textarea id="noteArea" placeholder="Start typing... everything is saved automatically to your browser."
            oninput="save()"></textarea>
        <div class="status" id="status">Last saved: Just now</div>
    </div>
    <script>
        const area = document.getElementById('noteArea');
        const status = document.getElementById('status');

        area.value = localStorage.getItem('mn_notes') || "";

        function save() {
            localStorage.setItem('mn_notes', area.value);
            const now = new Date();
            status.innerText = `Last saved: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
    </script>
</body>
