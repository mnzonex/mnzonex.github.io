    <style>
        body {
            padding: 40px 20px;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            margin-bottom: 25px;
        }

        .freq-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .freq-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .freq-item span {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-chart-simple"></i> Word Frequency</h1>
        <textarea id="inputText" placeholder="Paste your text here..." oninput="analyze()"></textarea>
        <div class="freq-list" id="resultGrid"></div>
    </div>
    <script>
        function analyze() {
            const text = document.getElementById('inputText').value;
            const words = text.toLowerCase().match(/\b\w+\b/g);
            if (!words) { document.getElementById('resultGrid').innerHTML = ""; return; }

            const freq = {};
            words.forEach(w => freq[w] = (freq[w] || 0) + 1);

            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 30);

            let html = "";
            sorted.forEach(([word, count]) => {
                html += `<div class="freq-item">${word} <span>${count}</span></div>`;
            });
            document.getElementById('resultGrid').innerHTML = html;
        }
    </script>
</body>
