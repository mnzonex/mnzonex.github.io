    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }

        p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-box {
            width: 100%;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .copy-btn {
            margin-top: 20px;
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-copy"></i> Fast Copy</h1>
        <p>Paste your content below and copy it instantly to your system clipboard.</p>
        <div class="input-box">
            <textarea id="copyArea" placeholder="Type or paste here..."></textarea>
        </div>
        <button class="copy-btn" onclick="copyContent()">
            <i class="fa-solid fa-paper-plane"></i> Copy to Clipboard
        </button>
    </div>

    <script>
        function copyContent() {
            const area = document.getElementById('copyArea');
            if (!area.value) return alert('Please enter some text first!');

            area.select();
            document.execCommand('copy');

            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            btn.style.background = '#00ff88';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'var(--primary)';
            }, 2000);
        }
    </script>
</body>
