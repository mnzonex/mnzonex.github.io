    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
        }

        .result-display {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            margin-top: 30px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .label {
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-calendar-alt"></i> Date Diff</h1>
        <div class="input-group">
            <label>Start Date</label>
            <input type="date" id="date1" onchange="calc()">
        </div>
        <div class="input-group">
            <label>End Date</label>
            <input type="date" id="date2" onchange="calc()">
        </div>
        <div class="result-display" id="result">0</div>
        <div class="label">Days Difference</div>
    </div>
    <script>
        function calc() {
            const d1 = new Date(document.getElementById('date1').value);
            const d2 = new Date(document.getElementById('date2').value);
            if (d1.getTime() && d2.getTime()) {
                const diff = Math.abs(d2 - d1);
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                document.getElementById('result').innerText = days;
            }
        }
    </script>
</body>
