    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-family: inherit;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            margin-top: 25px;
        }

        .btn-tool {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-user-shield"></i> Privacy Policy Gen</h1>
        <div class="input-group">
            <label>Website Name</label>
            <input type="text" id="webName" placeholder="e.g. MN ZONEX">
        </div>
        <div class="input-group">
            <label>Website URL</label>
            <input type="text" id="webUrl" placeholder="e.g. https://mnzonex.com">
        </div>
        <button class="btn-tool" onclick="genPrivacy()">Generate Policy</button>
        <textarea id="output" readonly></textarea>
    </div>
    <script>
        function genPrivacy() {
            const name = document.getElementById('webName').value || "[Website Name]";
            const url = document.getElementById('webUrl').value || "[URL]";
            const date = new Date().toLocaleDateString();

            const text = `Privacy Policy for ${name}
Last updated: ${date}

At ${name}, accessible from ${url}, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by ${name} and how we use it.

Log Files
${name} follows a standard procedure of using log files. These files log visitors when they visit websites.

Cookies and Web Beacons
Like any other website, ${name} uses 'cookies'. These cookies are used to store information including visitors' preferences, and the pages on the website that the visitor accessed or visited.

Information Collection and Use
We may collect personal information such as your name, email address, and other contact details when you use our services.

Contact Us
If you have additional questions or require more information about our Privacy Policy, do not hesitate to contact us.`;
            document.getElementById('output').value = text;
        }
    </script>
</body>

</html>
