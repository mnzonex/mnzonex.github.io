    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .dice {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 20px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #000;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .btn-roll {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-roll:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        @keyframes roll {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(90deg) scale(1.1);
            }

            50% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .anim-roll {
            animation: roll 0.4s linear;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-dice"></i> Dice Roller</h1>
        <div class="dice" id="dice"><i class="fa-solid fa-dice-five"></i></div>
        <button class="btn-roll" onclick="roll()">Roll Dice</button>
    </div>
    <script>
        const icons = [
            '<i class="fa-solid fa-dice-one"></i>',
            '<i class="fa-solid fa-dice-two"></i>',
            '<i class="fa-solid fa-dice-three"></i>',
            '<i class="fa-solid fa-dice-four"></i>',
            '<i class="fa-solid fa-dice-five"></i>',
            '<i class="fa-solid fa-dice-six"></i>'
        ];
        function roll() {
            const dice = document.getElementById('dice');
            dice.classList.add('anim-roll');
            setTimeout(() => {
                const res = Math.floor(Math.random() * 6);
                dice.innerHTML = icons[res];
                dice.classList.remove('anim-roll');
            }, 400);
        }
    </script>
</body>
