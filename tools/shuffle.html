    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            margin-bottom: 25px;
        }

        .btn-tool {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-tool:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-list-ol"></i> List Shuffler</h1>
        <p style="text-align:center; color:var(--text-muted); margin-bottom:20px">Enter items (one per line) to
            randomize them.</p>
        <textarea id="listInput" placeholder="Item 1&#10;Item 2&#10;Item 3..."></textarea>
        <button class="btn-tool" onclick="shuffleList()">Shuffle List</button>
    </div>
    <script>
        function shuffleList() {
            const area = document.getElementById('listInput');
            const items = area.value.split('\n').filter(i => i.trim() !== "");
            if (items.length < 2) return alert('Enter at least 2 items!');

            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            area.value = items.join('\n');
        }
    </script>
</body>
