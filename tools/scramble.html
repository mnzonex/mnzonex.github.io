    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 25px;
            font-size: 20px;
            text-align: center;
        }

        .scrambled {
            font-size: 40px;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-font-awesome"></i> Word Scramble</h1>
        <input type="text" id="input" placeholder="Type a word..." oninput="scramble()">
        <div class="scrambled" id="output">---</div>
        <p style="color:var(--text-muted)">Perfect for anagrams and puzzles.</p>
    </div>
    <script>
        function scramble() {
            const word = document.getElementById('input').value;
            if (!word) { document.getElementById('output').innerText = "---"; return; }
            const scrambled = word.split('').sort(() => Math.random() - 0.5).join('');
            document.getElementById('output').innerText = scrambled;
        }
    </script>
</body>
