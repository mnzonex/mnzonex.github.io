  <style>
    body {
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    .tool-container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      text-align: center;
    }

    .gauge {
      width: 250px;
      height: 250px;
      border: 15px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      margin: 0 auto 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border-top-color: var(--primary);
    }

    .speed-val {
      font-size: 60px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .unit {
      font-size: 18px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .btn-test {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 15px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-test:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .anim-spin {
      animation: rotate 1s linear infinite;
    }
  </style>
</head>

<body>
  <div class="tool-container">
    <h1><i class="fa-solid fa-gauge-high"></i> Speed Test</h1>
    <p style="color:var(--text-muted); margin-bottom:30px">Simulated Speed Analysis</p>
    <div class="gauge" id="gauge">
      <div class="speed-val" id="speed">0.0</div>
      <div class="unit">Mbps</div>
    </div>
    <button class="btn-test" id="testBtn" onclick="runTest()">Start Speed Test</button>
    <p style="margin-top:20px; color:var(--text-muted); font-size:12px">* Real speed tests require large servers. This
      is a simulation.</p>
  </div>
  <script>
    function runTest() {
      const btn = document.getElementById('testBtn');
      const gauge = document.getElementById('gauge');
      const speed = document.getElementById('speed');

      btn.disabled = true;
      btn.innerText = "Testing...";
      gauge.classList.add('anim-spin');

      let count = 0;
      const interval = setInterval(() => {
        speed.innerText = (Math.random() * 100).toFixed(1);
        count++;
        if (count > 30) {
          clearInterval(interval);
          gauge.classList.remove('anim-spin');
          speed.innerText = (Math.random() * 50 + 20).toFixed(1);
          btn.disabled = false;
          btn.innerText = "Restart Test";
        }
      }, 100);
    }
  </script>
</body>
