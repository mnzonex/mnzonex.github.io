    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-shield-halved"></i> Base64 Tool</h1>
        <textarea id="input" placeholder="Enter Text or Base64 here..."></textarea>
        <div class="btn-group">
            <button class="btn" onclick="encode()">Encode</button>
            <button class="btn" onclick="decode()">Decode</button>
        </div>
        <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
    </div>
    <script>
        function encode() {
            try { document.getElementById('output').value = btoa(document.getElementById('input').value); }
            catch (e) { alert('Encoding failed!'); }
        }
        function decode() {
            try { document.getElementById('output').value = atob(document.getElementById('input').value); }
            catch (e) { alert('Invalid Base64!'); }
        }
    </script>
</body>
