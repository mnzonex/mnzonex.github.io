    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .preview {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        input[type="range"] {
            accent-color: var(--primary);
        }

        .result-code {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-family: monospace;
            color: #fff;
            word-break: break-all;
            margin-top: 20px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: var(--primary);
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-fill-drip"></i> Gradient Gen</h1>
        <div class="preview" id="preview"></div>
        <div class="controls">
            <div class="control-group">
                <label>Color 1</label>
                <input type="color" id="color1" value="#ff00cc" oninput="update()">
            </div>
            <div class="control-group">
                <label>Color 2</label>
                <input type="color" id="color2" value="#3333ff" oninput="update()">
            </div>
            <div class="control-group">
                <label>Angle: <span id="angleVal">90</span>°</label>
                <input type="range" id="angle" min="0" max="360" value="90" oninput="update()">
            </div>
            <div class="control-group">
                <label>Type</label>
                <select id="type" onchange="update()"
                    style="padding:10px; border-radius:8px; background:#111; color:#fff; border:1px solid rgba(255,255,255,0.1);">
                    <option value="linear-gradient">Linear</option>
                    <option value="radial-gradient">Radial</option>
                </select>
            </div>
        </div>
        <div class="result-code">
            <code id="cssCode">background: linear-gradient(90deg, #ff00cc, #3333ff);</code>
            <button class="copy-btn" onclick="copy()">COPY</button>
        </div>
    </div>
    <script>
        function update() {
            const c1 = document.getElementById('color1').value;
            const c2 = document.getElementById('color2').value;
            const angle = document.getElementById('angle').value;
            const type = document.getElementById('type').value;
            document.getElementById('angleVal').innerText = angle;

            let grad = "";
            if (type === "linear-gradient") {
                grad = `${type}(${angle}deg, ${c1}, ${c2})`;
            } else {
                grad = `${type}(circle, ${c1}, ${c2})`;
            }

            document.getElementById('preview').style.background = grad;
            document.getElementById('cssCode').innerText = `background: ${grad};`;
        }
        function copy() {
            navigator.clipboard.writeText(document.getElementById('cssCode').innerText);
            alert('CSS Copied!');
        }
        update();
    </script>
</body>
