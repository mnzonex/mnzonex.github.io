    <style>
        body { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; background: #000; }
        .tool-container { max-width: 500px; width: 100%; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 800; color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #ccc; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; font-family: inherit; }
        .result-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; margin-top: 30px; border: 1px solid var(--glass-border); }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 15px; color: #fff; font-weight: 600; }
        .result-item.total { border-top: 1px solid rgba(255,255,255,0.1); pt: 15px; margin-top: 15px; color: var(--primary); font-size: 20px; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-percent"></i> GST/Tax Calc</h1>
        <div class="input-group">
            <label>Amount ($)</label>
            <input type="number" id="baseAmount" value="1000" oninput="calc()">
        </div>
        <div class="input-group">
            <label>Tax Rate (%)</label>
            <input type="number" id="taxRate" value="18" oninput="calc()">
        </div>
        <div class="result-box">
            <div class="result-item">Tax Amount: <span id="taxValue">$00.00</span></div>
            <div class="result-item total">Total Amount: <span id="totalValue">$00.00</span></div>
        </div>
    </div>
    <script>
        function calc() {
            const amount = parseFloat(document.getElementById('baseAmount').value);
            const rate = parseFloat(document.getElementById('taxRate').value);
            if(amount && rate) {
                const tax = (amount * rate) / 100;
                document.getElementById('taxValue').innerText = `$${tax.toFixed(2)}`;
                document.getElementById('totalValue').innerText = `$${(amount + tax).toFixed(2)}`;
            }
        }
        calc();
    </script>
</body>
