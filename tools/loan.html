    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
        }

        .result-box {
            background: var(--primary);
            color: #000;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            text-align: center;
        }

        .result-box h2 {
            font-size: 40px;
            margin-bottom: 5px;
        }

        .result-box p {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-money-bill-wave"></i> Loan/EMI</h1>
        <div class="input-group">
            <label>Loan Amount ($)</label>
            <input type="number" id="amount" value="10000" oninput="calc()">
        </div>
        <div class="input-group">
            <label>Interest Rate (%)</label>
            <input type="number" id="rate" value="10" oninput="calc()">
        </div>
        <div class="input-group">
            <label>Tenure (Months)</label>
            <input type="number" id="months" value="12" oninput="calc()">
        </div>
        <div class="result-box">
            <p>Monthly EMI</p>
            <h2 id="emi">$0.00</h2>
            <p id="total">Total Interest: $0.00</p>
        </div>
    </div>
    <script>
        function calc() {
            const p = parseFloat(document.getElementById('amount').value);
            const annualRate = parseFloat(document.getElementById('rate').value);
            const n = parseFloat(document.getElementById('months').value);

            if (p > 0 && n > 0) {
                let emi;
                if (annualRate === 0) {
                    emi = p / n;
                } else {
                    const r = annualRate / 1200;
                    emi = p * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
                }

                const totalPayment = emi * n;
                const totalInterest = totalPayment - p;

                document.getElementById('emi').innerText = `$${emi.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                document.getElementById('total').innerText = `Total Interest: $${totalInterest.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            } else {
                document.getElementById('emi').innerText = "$0.00";
                document.getElementById('total').innerText = "Total Interest: $0.00";
            }
        }
        calc();
    </script>
</body>
