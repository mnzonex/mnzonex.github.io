    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-tool {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-tool:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-font"></i> Text Converter</h1>
        <textarea id="inputText" placeholder="Enter or paste your text here..."></textarea>
        <div class="btn-group">
            <button class="btn-tool" onclick="convert('up')">UPPERCASE</button>
            <button class="btn-tool" onclick="convert('low')">lowercase</button>
            <button class="btn-tool" onclick="convert('cap')">Capitalize</button>
            <button class="btn-tool" onclick="copy()">Copy Text</button>
        </div>
    </div>

    <script>
        function convert(type) {
            const area = document.getElementById('inputText');
            if (type === 'up') area.value = area.value.toUpperCase();
            if (type === 'low') area.value = area.value.toLowerCase();
            if (type === 'cap') {
                area.value = area.value.split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1).toLowerCase()).join(' ');
            }
        }
        function copy() {
            const area = document.getElementById('inputText');
            area.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }
    </script>
</body>
