    <style>
        body {
            padding: 40px 20px;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .img-container {
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 30px;
            background: #111;
        }

        img {
            width: 100%;
            transition: 0.3s;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .control-group {
            text-align: left;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-wand-magic"></i> Image Filter</h1>
        <div class="img-container">
            <img id="previewImg" src="../assets/images/games/game6.jpg" alt="Preview Image">
        </div>
        <div class="controls">
            <div class="control-group"><label>Grayscale</label><input type="range" id="gray" min="0" max="100" value="0"
                    oninput="update()"></div>
            <div class="control-group"><label>Blur (px)</label><input type="range" id="blur" min="0" max="20" value="0"
                    oninput="update()"></div>
            <div class="control-group"><label>Brightness</label><input type="range" id="bright" min="0" max="200"
                    value="100" oninput="update()"></div>
            <div class="control-group"><label>Contrast</label><input type="range" id="cont" min="0" max="200"
                    value="100" oninput="update()"></div>
        </div>
        <div style="margin-top:20px; background:#111; padding:15px; border-radius:10px; font-family:monospace"
            id="code">
            filter: grayscale(0%) blur(0px) brightness(100%) contrast(100%);
        </div>
    </div>
    <script>
        function update() {
            const g = document.getElementById('gray').value;
            const b = document.getElementById('blur').value;
            const br = document.getElementById('bright').value;
            const c = document.getElementById('cont').value;
            const img = document.getElementById('previewImg');

            const filter = `grayscale(${g}%) blur(${b}px) brightness(${br}%) contrast(${c}%)`;
            img.style.filter = filter;
            document.getElementById('code').innerText = `filter: ${filter};`;
        }
    </script>
</body>
