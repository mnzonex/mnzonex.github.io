    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        input[type="date"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 25px;
        }

        .age-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .age-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .age-item span {
            display: block;
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
        }

        .age-item label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-calendar-day"></i> Age Calculator</h1>
        <label style="display:block; margin-bottom:10px; color:var(--text-muted)">Select Your Birth Date</label>
        <input type="date" id="dob" onchange="calculate()">
        <div class="age-grid">
            <div class="age-item"><span id="years">0</span><label>Years</label></div>
            <div class="age-item"><span id="months">0</span><label>Months</label></div>
            <div class="age-item"><span id="days">0</span><label>Days</label></div>
        </div>
    </div>
    <script>
        function calculate() {
            const birthDate = new Date(document.getElementById('dob').value);
            const today = new Date();
            if (!birthDate.getTime()) return;

            let y = today.getFullYear() - birthDate.getFullYear();
            let m = today.getMonth() - birthDate.getMonth();
            let d = today.getDate() - birthDate.getDate();

            if (d < 0) { m--; d += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }

            document.getElementById('years').innerText = y;
            document.getElementById('months').innerText = m;
            document.getElementById('days').innerText = d;
        }
    </script>
</body>
