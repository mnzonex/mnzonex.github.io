    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .result-area {
            width: 100%;
            min-height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
            font-size: 18px;
            line-height: 1.6;
        }

        .btn-mic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: #000;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-mic.active {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0);
            }
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-microphone"></i> Speech to Text</h1>
        <div class="result-area" id="result">Click the mic and start speaking...</div>
        <button class="btn-mic" id="micBtn" onclick="toggleRecord()"><i class="fa-solid fa-microphone"></i></button>
        <p id="status" style="color:var(--text-muted); font-size:14px">Microphone is OFF</p>
    </div>
    <script>
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const micBtn = document.getElementById('micBtn');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                status.innerText = "Listening...";
                micBtn.classList.add('active');
            };

            let isRecording = false;
            let finalTranscript = "";

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                result.innerHTML = `<span style="color:#fff">${finalTranscript}</span><span style="color:var(--primary)">${interimTranscript}</span>`;
            };

            recognition.onerror = (event) => {
                status.innerText = "Error occurred in recognition: " + event.error;
                isRecording = false;
                micBtn.classList.remove('active');
            };

            recognition.onend = () => {
                status.innerText = "Microphone is OFF";
                micBtn.classList.remove('active');
                isRecording = false;
            };

            function toggleRecord() {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                } else {
                    try {
                        recognition.start();
                        isRecording = true;
                        status.innerText = "Starting...";
                    } catch (e) {
                        console.error(e);
                    }
                }
            }
        } else {
            result.innerText = "Speech Recognition not supported in this browser.";
            micBtn.style.display = "none";
        }
    </script>
</body>
