    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .coin {
            width: 150px;
            height: 150px;
            background: var(--primary);
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 900;
            color: #000;
            box-shadow: 0 0 30px var(--primary-glow);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flip-anim {
            transform: rotateY(1800deg) scale(1.2);
        }

        .btn-flip {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-flip:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-coins"></i> Coin Flipper</h1>
        <div class="coin" id="coin">?</div>
        <button class="btn-flip" onclick="flip()">Flip Coin</button>
    </div>
    <script>
        function flip() {
            const coin = document.getElementById('coin');
            coin.classList.add('flip-anim');
            coin.innerText = "...";

            setTimeout(() => {
                const res = Math.random() > 0.5 ? "HEADS" : "TAILS";
                coin.innerText = res;
                coin.classList.remove('flip-anim');
            }, 600);
        }
    </script>
</body>
