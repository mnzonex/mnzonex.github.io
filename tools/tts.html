    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            resize: none;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        select,
        input[type="range"] {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .btn-speak {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-speak:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-volume-high"></i> Text to Speech</h1>
        <textarea id="text" placeholder="Type something to hear it..."></textarea>
        <div class="controls">
            <div>
                <label style="display:block; margin-bottom:5px; font-size:12px; color:var(--text-muted)">Voice</label>
                <select id="voices"></select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-size:12px; color:var(--text-muted)">Pitch</label>
                <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1">
            </div>
        </div>
        <button class="btn-speak" onclick="speak()"><i class="fa-solid fa-play"></i> Speak Now</button>
    </div>
    <script>
        const voiceSelect = document.getElementById('voices');
        let voices = [];

        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                voiceSelect.innerHTML = voices
                    .filter((v, index, self) => index === self.findIndex((t) => t.name === v.name))
                    .map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`)
                    .join('');
                if (voiceLoadInterval) clearInterval(voiceLoadInterval);
            }
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        const voiceLoadInterval = setInterval(loadVoices, 500);
        loadVoices();

        function speak() {
            const text = document.getElementById('text').value;
            if (!text) return;
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.voice = voices[voiceSelect.value];
            msg.pitch = document.getElementById('pitch').value;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
