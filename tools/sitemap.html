    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: 'Courier New', monospace;
            resize: none;
            margin-bottom: 25px;
        }

        .btn-tool {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-sitemap"></i> Sitemap Gen</h1>
        <p style="text-align:center; color:var(--text-muted); margin-bottom:20px">Enter URLs (one per line) to generate
            an XML Sitemap.</p>
        <textarea id="urlInput" placeholder="https://example.com/page1&#10;https://example.com/page2..."></textarea>
        <button class="btn-tool" onclick="genSitemap()">Generate XML</button>
        <textarea id="output" style="margin-top:20px; height:200px" readonly></textarea>
    </div>
    <script>
        function genSitemap() {
            const urls = document.getElementById('urlInput').value.split('\n').filter(u => u.trim() !== "");
            if (!urls.length) return alert('Enter at least one URL!');

            let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
            urls.forEach(u => {
                xml += `  <url>\n    <loc>${u.trim()}</loc>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>\n`;
            });
            xml += '</urlset>';
            document.getElementById('output').value = xml;
        }
    </script>
</body>
