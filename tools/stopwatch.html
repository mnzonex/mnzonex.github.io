    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .time-display {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            font-variant-numeric: tabular-nums;
            margin-bottom: 30px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn-tool {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-start {
            background: var(--primary);
            color: #000;
        }

        .btn-stop {
            background: #ff4444;
            color: #fff;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-stopwatch"></i> Stopwatch</h1>
        <div class="time-display" id="display">00:00:00</div>
        <div class="btn-group">
            <button class="btn-tool btn-start" id="startBtn" onclick="start()">Start</button>
            <button class="btn-tool btn-stop" onclick="stop()">Stop</button>
            <button class="btn-tool btn-reset" onclick="reset()">Reset</button>
        </div>
    </div>
    <script>
        let startTime, elapsedTime = 0, timerInterval;
        function timeToString(time) {
            let diffInHrs = time / 3600000;
            let hh = Math.floor(diffInHrs);
            let diffInMin = (diffInHrs - hh) * 60;
            let mm = Math.floor(diffInMin);
            let diffInSec = (diffInMin - mm) * 60;
            let ss = Math.floor(diffInSec);
            return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
        }
        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                document.getElementById("display").innerHTML = timeToString(elapsedTime);
            }, 1000);
            document.getElementById('startBtn').disabled = true;
        }
        function stop() { clearInterval(timerInterval); document.getElementById('startBtn').disabled = false; }
        function reset() { stop(); elapsedTime = 0; document.getElementById("display").innerHTML = "00:00:00"; }
    </script>
</body>
