    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .preview-box {
            width: 150px;
            height: 150px;
            background: var(--primary);
            margin: 50px auto;
            border-radius: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: #ccc;
            font-size: 14px;
        }

        input[type="range"] {
            accent-color: var(--primary);
        }

        .result-code {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-family: monospace;
            color: #fff;
            margin-top: 30px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: var(--primary);
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-layer-group"></i> Box Shadow</h1>
        <div class="preview-box" id="box"></div>
        <div class="controls">
            <div class="control-group"><label>Horizontal Offset</label><input type="range" id="h" min="-50" max="50"
                    value="10" oninput="update()"></div>
            <div class="control-group"><label>Vertical Offset</label><input type="range" id="v" min="-50" max="50"
                    value="10" oninput="update()"></div>
            <div class="control-group"><label>Blur Radius</label><input type="range" id="b" min="0" max="100" value="20"
                    oninput="update()"></div>
            <div class="control-group"><label>Spread Radius</label><input type="range" id="s" min="-50" max="50"
                    value="0" oninput="update()"></div>
            <div class="control-group"><label>Shadow Color</label><input type="color" id="color" value="#000000"
                    oninput="update()" style="width:100%; height:40px; background:transparent; border:none;"></div>
            <div class="control-group"><label>Opacity</label><input type="range" id="o" min="0" max="100" value="50"
                    oninput="update()"></div>
        </div>
        <div class="result-code">
            <code id="cssCode">box-shadow: 10px 10px 20px 0px rgba(0,0,0,0.5);</code>
            <button class="copy-btn" onclick="copy()">COPY</button>
        </div>
    </div>
    <script>
        function update() {
            const h = document.getElementById('h').value;
            const v = document.getElementById('v').value;
            const b = document.getElementById('b').value;
            const s = document.getElementById('s').value;
            const color = document.getElementById('color').value;
            const o = document.getElementById('o').value / 100;

            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const bl = parseInt(color.slice(5, 7), 16);

            const shadow = `${h}px ${v}px ${b}px ${s}px rgba(${r},${g},${bl},${o})`;
            document.getElementById('box').style.boxShadow = shadow;
            document.getElementById('cssCode').innerText = `box-shadow: ${shadow};`;
        }
        function copy() {
            navigator.clipboard.writeText(document.getElementById('cssCode').innerText);
            alert('CSS Copied!');
        }
        update();
    </script>
</body>
