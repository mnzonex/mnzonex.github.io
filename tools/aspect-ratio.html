    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            text-align: center;
        }

        .label {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-expand"></i> Aspect Ratio</h1>
        <div style="margin-bottom:30px">
            <label class="label">Original Dimension</label>
            <div class="input-row">
                <input type="number" id="w1" value="1920" oninput="calc()">
                <span style="color:var(--primary)">×</span>
                <input type="number" id="h1" value="1080" oninput="calc()">
            </div>
        </div>
        <div>
            <label class="label">New Dimension (Scale)</label>
            <div class="input-row">
                <input type="number" id="w2" value="1280" oninput="scaleHeight()">
                <span style="color:var(--primary)">×</span>
                <input type="number" id="h2" oninput="scaleWidth()">
            </div>
        </div>
    </div>
    <script>
        function calc() { scaleHeight(); }
        function scaleHeight() {
            const w1 = document.getElementById('w1').value;
            const h1 = document.getElementById('h1').value;
            const w2 = document.getElementById('w2').value;
            if (w1 && h1 && w2) {
                document.getElementById('h2').value = Math.round((h1 / w1) * w2);
            }
        }
        function scaleWidth() {
            const w1 = document.getElementById('w1').value;
            const h1 = document.getElementById('h1').value;
            const h2 = document.getElementById('h2').value;
            if (w1 && h1 && h2) {
                document.getElementById('w2').value = Math.round((w1 / h1) * h2);
            }
        }
        window.onload = scaleHeight;
    </script>
</body>
