    <style>
        body {
            padding: 40px 20px;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .tool-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .grid-preview {
            display: grid;
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed var(--primary);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 30px;
            min-height: 200px;
        }

        .grid-item {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--primary);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            background: #111;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .code-res {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            font-family: monospace;
            position: relative;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-table-cells"></i> Grid Builder</h1>
        <div class="grid-preview" id="gridPreview"></div>
        <div class="controls">
            <div class="control-group"><label>Columns</label><input type="number" id="cols" value="3"
                    oninput="update()"></div>
            <div class="control-group"><label>Gap (px)</label><input type="number" id="gap" value="10"
                    oninput="update()"></div>
            <div class="control-group"><label>Items</label><input type="number" id="items" value="6" oninput="update()">
            </div>
        </div>
        <div class="code-res">
            <code id="code">display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;</code>
        </div>
    </div>
    <script>
        function update() {
            const cols = document.getElementById('cols').value;
            const gap = document.getElementById('gap').value;
            const items = document.getElementById('items').value;
            const preview = document.getElementById('gridPreview');

            preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            preview.style.gap = `${gap}px`;

            preview.innerHTML = "";
            for (let i = 1; i <= items; i++) {
                const div = document.createElement('div');
                div.className = "grid-item";
                div.innerText = i;
                preview.appendChild(div);
            }

            document.getElementById('code').innerText = `display: grid; \ngrid-template-columns: repeat(${cols}, 1fr); \ngap: ${gap}px;`;
        }
        update();
    </script>
</body>
