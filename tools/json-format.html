    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            padding: 20px;
            font-family: 'Courier New', monospace;
            resize: none;
            margin-bottom: 20px;
        }

        .btn-tool {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-code"></i> JSON Format</h1>
        <textarea id="jsonInput" placeholder="Paste messy JSON here..."></textarea>
        <button class="btn-tool" onclick="formatJSON()">Format & Validate</button>
    </div>
    <script>
        function formatJSON() {
            const area = document.getElementById('jsonInput');
            try {
                const obj = JSON.parse(area.value);
                area.value = JSON.stringify(obj, null, 4);
            } catch (e) { alert('Invalid JSON Format!'); }
        }
    </script>
</body>
