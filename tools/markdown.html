    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            padding: 40px 20px;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .tool-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            height: 80vh;
        }

        .editor,
        .preview {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #fff;
            resize: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
        }

        .preview h1,
        .preview h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .preview p {
            line-height: 1.6;
            margin-bottom: 15px;
            color: #ccc;
        }
    </style>
</head>

<body>
    <h1 style="text-align:center; color: var(--primary); margin-bottom:30px;"><i class="fa-brands fa-markdown"></i>
        Markdown Pro</h1>
    <div class="tool-container">
        <div class="editor">
            <textarea id="editor" oninput="updatePreview()" placeholder="# Type Markdown here..."></textarea>
        </div>
        <div class="preview" id="preview"></div>
    </div>
    <script>
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function updatePreview() {
            const code = document.getElementById('editor').value;
            try {
                document.getElementById('preview').innerHTML = marked.parse(code);
            } catch (e) {
                console.error("Markdown parsing error:", e);
            }
        }

        // Dynamic initial text
        const initialText = "# Welcome to MN ZONEX Markdown\n\nStart writing your **Markdown** here and see it rendered instantly on the right.\n\n### Features:\n- Live Preview\n- High Performance\n- Simple Interface\n\n```javascript\nconsole.log('Hello World');\n```";

        document.getElementById('editor').value = initialText;
        updatePreview();
    </script>
</body>
