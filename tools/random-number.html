    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .result-box {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            margin: 30px 0;
            min-height: 80px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .inputs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 10px;
            text-align: center;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-gen {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gen:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-shuffle"></i> Random Gen</h1>
        <div class="result-box" id="result">?</div>
        <div class="inputs">
            <div class="input-group">
                <label>Min</label>
                <input type="number" id="min" value="1">
            </div>
            <div class="input-group">
                <label>Max</label>
                <input type="number" id="max" value="100">
            </div>
        </div>
        <button class="btn-gen" onclick="generate()">Generate Number</button>
    </div>

    <script>
        function generate() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);
            const res = document.getElementById('result');

            let count = 0;
            const interval = setInterval(() => {
                res.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    res.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
                }
            }, 50);
        }
    </script>
</body>
