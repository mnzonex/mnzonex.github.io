    <style>
        body {
            padding: 40px 20px;
            background: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .tool-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        .preview-text {
            font-size: 24px;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .ratio-box {
            font-size: 40px;
            font-weight: 900;
            color: var(--primary);
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-eye"></i> Contrast Checker</h1>
        <div class="preview-text" id="preview" style="background: #fff; color: #000;">Sample Text: Check Readability
        </div>
        <div class="controls">
            <div><label>Background</label><input type="color" id="bg" value="#ffffff" oninput="update()"></div>
            <div><label>Text Color</label><input type="color" id="fg" value="#000000" oninput="update()"></div>
        </div>
        <div class="ratio-box" id="ratio">21.0:1</div>
        <p id="grade" style="font-weight:700; color:var(--primary)">PASS (AAA)</p>
    </div>
    <script>
        function lum(c) {
            const r = parseInt(c.slice(1, 3), 16) / 255;
            const g = parseInt(c.slice(3, 5), 16) / 255;
            const b = parseInt(c.slice(5, 7), 16) / 255;
            const a = [r, g, b].map(v => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4));
            return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
        }
        function update() {
            const bg = document.getElementById('bg').value;
            const fg = document.getElementById('fg').value;
            const view = document.getElementById('preview');
            view.style.background = bg;
            view.style.color = fg;

            const l1 = lum(bg) + 0.05;
            const l2 = lum(fg) + 0.05;
            const ratio = (Math.max(l1, l2) / Math.min(l1, l2)).toFixed(2);
            document.getElementById('ratio').innerText = ratio + ":1";

            const grade = document.getElementById('grade');
            if (ratio >= 7) { grade.innerText = "PASS (AAA)"; grade.style.color = "#00ff88"; }
            else if (ratio >= 4.5) { grade.innerText = "PASS (AA)"; grade.style.color = "#ffcc00"; }
            else { grade.innerText = "FAIL (Low Contrast)"; grade.style.color = "#ff4444"; }
        }
    </script>
</body>
