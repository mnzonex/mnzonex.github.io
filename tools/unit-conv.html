    <style>
        body {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .tool-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }

        .converter-grid {
            display: grid;
            gap: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .equal-sign {
            text-align: center;
            font-size: 24px;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <h1><i class="fa-solid fa-ruler-combined"></i> Unit Converter</h1>
        <div class="converter-grid">
            <select id="typeSelect" onchange="convert()">
                <option value="length">Length (Meter to Feet)</option>
                <option value="weight">Weight (KG to Lbs)</option>
                <option value="temp">Temp (Celsius to Fahr)</option>
                <option value="area">Area (Sq M to Sq Ft)</option>
                <option value="speed">Speed (M/s to MPH)</option>
            </select>
            <input type="number" id="inputVal" placeholder="Enter Value" oninput="convert()">
            <div class="equal-sign"><i class="fa-solid fa-arrows-up-down"></i></div>
            <input type="number" id="outputVal" placeholder="Result" readonly>
            <p id="label" style="text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 10px;">
                Select a type and enter a number</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('inputVal');
        const output = document.getElementById('outputVal');
        const type = document.getElementById('typeSelect');
        const label = document.getElementById('label');

        const conversions = {
            length: { factor: 3.28084, label: "Meters to Feet", unit: "ft" },
            weight: { factor: 2.20462, label: "KG to Pounds", unit: "lbs" },
            area: { factor: 10.7639, label: "Sq Meters to Sq Feet", unit: "sq ft" },
            speed: { factor: 2.23694, label: "M/s to MPH", unit: "mph" }
        };

        function convert() {
            const val = parseFloat(input.value);
            if (isNaN(val)) {
                output.value = '';
                label.innerText = 'Select a type and enter a number';
                return;
            }

            const selectedType = type.value;

            if (selectedType === 'temp') {
                const f = ((val * 9 / 5) + 32).toFixed(2);
                output.value = f;
                label.innerText = `${val}°Celsius = ${f}°Fahrenheit`;
            } else {
                const config = conversions[selectedType];
                const res = (val * config.factor).toFixed(3);
                output.value = res;
                label.innerText = `${val} ${config.label.split(' to ')[0]} = ${res} ${config.unit}`;
            }
        }
    </script>
</body>
