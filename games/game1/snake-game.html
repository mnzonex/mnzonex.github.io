    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff007f;
            --bg-dark: #050508;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            font-family: 'Press Start 2P', cursive;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: white; overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            position: relative; border: 4px solid #1a1a1a;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }

        canvas { background: #000; display: block; image-rendering: pixelated; }

        .hud {
            width: 100%; max-width: 400px; display: flex; justify-content: space-between;
            margin-bottom: 10px; font-size: 10px; color: var(--neon-green);
        }

        /* Mobile Controls */
        .controls {
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px);
            gap: 10px; margin-top: 20px;
        }

        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-green); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-green); font-size: 20px; cursor: pointer;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .btn:active { background: var(--neon-green); color: black; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; text-align: center;
        }

        .hidden { display: none !important; }
        
        .copyright {
  font-family: Arial, sans-serif; 
  font-size: 12px;
  color: #666;
  text-align: center;
}

<body>

    <div class="hud">
        <div>SCORE: <span id="score">00</span></div>
        <div>HIGH: <span id="high">00</span></div>
    </div>

    <div id="game-wrapper">
        <div id="start-screen" class="overlay">
            <h2 style="color: var(--neon-green); font-size: 18px;">SNAKE PRO</h2>
            <button onclick="game.init()" style="padding: 15px 30px; font-family: inherit; cursor: pointer; background: var(--neon-green); border: none;">START</button>
        </div>

        <div id="death-screen" class="overlay hidden">
            <h2 style="color: var(--neon-pink);">CRASHED!</h2>
            <button onclick="game.init()" style="padding: 15px 30px; font-family: inherit; cursor: pointer; background: var(--neon-pink); border: none;">RETRY</button>
        </div>

        <canvas id="snakeCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="btn up" onclick="game.setDir(0, -1)">▲</div>
        <div class="btn left" onclick="game.setDir(-1, 0)">◀</div>
        <div class="btn down" onclick="game.setDir(0, 1)">▼</div>
        <div class="btn right" onclick="game.setDir(1, 0)">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let tileCount;

        // Sound System
        const sfx = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type, dur) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            },
            eat() { this.play(800, 'square', 0.1); },
            dead() { this.play(100, 'sawtooth', 0.5); }
        };

        const game = {
            active: false,
            score: 0,
            high: localStorage.getItem('snakeHigh') || 0,
            fps: 8,

            init() {
                sfx.init();
                const size = Math.min(window.innerWidth - 40, 400);
                canvas.width = canvas.height = Math.floor(size / gridSize) * gridSize;
                tileCount = canvas.width / gridSize;
                
                this.snake = [{x: 10, y: 10}];
                this.food = this.spawnFood();
                this.dir = {x: 0, y: 0};
                this.nextDir = {x: 0, y: 0};
                this.score = 0;
                this.fps = 8;
                this.active = true;

                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('death-screen').classList.add('hidden');
                document.getElementById('high').innerText = this.high;
                
                if(this.timer) clearTimeout(this.timer);
                this.loop();
            },

            spawnFood() {
                let f;
                while(!f || this.snake.some(s => s.x === f.x && s.y === f.y)) {
                    f = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount) };
                }
                return f;
            },

            setDir(x, y) {
                if(!this.active) return;
                if(x !== -this.dir.x || y !== -this.dir.y) {
                    this.nextDir = {x, y};
                }
            },

            update() {
                this.dir = this.nextDir;
                if(this.dir.x === 0 && this.dir.y === 0) return;

                const head = { x: this.snake[0].x + this.dir.x, y: this.snake[0].y + this.dir.y };

                // Collision Logic
                if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                   this.snake.some(s => s.x === head.x && s.y === head.y)) {
                    return this.over();
                }

                this.snake.unshift(head);

                if(head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    sfx.eat();
                    this.food = this.spawnFood();
                    this.fps = Math.min(20, this.fps + 0.3);
                } else {
                    this.snake.pop();
                }
            },

            draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Food Glow
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff007f';
                ctx.fillStyle = '#ff007f';
                ctx.fillRect(this.food.x*gridSize+2, this.food.y*gridSize+2, gridSize-4, gridSize-4);

                // Snake Glow
                ctx.shadowBlur = 10; ctx.shadowColor = '#39ff14';
                this.snake.forEach((s, i) => {
                    ctx.fillStyle = i === 0 ? '#fff' : '#39ff14';
                    ctx.fillRect(s.x*gridSize+1, s.y*gridSize+1, gridSize-2, gridSize-2);
                });
                ctx.shadowBlur = 0;

                document.getElementById('score').innerText = this.score;
            },

            over() {
                this.active = false;
                sfx.dead();
                if(this.score > this.high) {
                    this.high = this.score;
                    localStorage.setItem('snakeHigh', this.high);
                }
                document.getElementById('death-screen').classList.remove('hidden');
            },

            loop() {
                if(!this.active) return;
                this.update();
                this.draw();
                this.timer = setTimeout(() => this.loop(), 1000 / this.fps);
            }
        };

        // Keyboard support
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') game.setDir(0, -1);
            if(e.key === 'ArrowDown') game.setDir(0, 1);
            if(e.key === 'ArrowLeft') game.setDir(-1, 0);
            if(e.key === 'ArrowRight') game.setDir(1, 0);
        });
    </script>
