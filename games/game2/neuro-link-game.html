    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --accent: #06b6d4; --gold: #f59e0b; --danger: #ef4444; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-family: 'Syncopate'; font-size: 10px; color: var(--accent); z-index: 10; }
        
        #canvas-container { position: relative; padding: 20px; background: radial-gradient(circle at center, #1e293b 0%, #030712 100%); border: 1px solid rgba(6, 182, 212, 0.2); border-radius: 20px; }
        canvas { cursor: crosshair; filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4)); }

        .overlay { position: absolute; inset: 0; background: rgba(3, 7, 18, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(15px); transition: 0.5s; }
        .hidden { opacity: 0; pointer-events: none; display: none; }

        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px 30px; font-family: 'Syncopate'; font-size: 10px; cursor: pointer; transition: 0.3s; letter-spacing: 2px; border-radius: 4px; margin: 10px; }
        .btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px var(--accent); }
        
        #solve-btn-overlay { border-color: var(--gold); color: var(--gold); font-weight: bold; }
        #solve-btn-overlay:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        .button-row { margin-top: 25px; display: none; gap: 15px; z-index: 30; }
        .button-row.show { display: flex; }

        .critical-text { color: var(--danger); font-family: 'Syncopate'; font-size: 20px; margin-bottom: 5px; text-shadow: 0 0 10px var(--danger); }
        .sub-text { font-size: 10px; opacity: 0.7; margin-bottom: 20px; letter-spacing: 1px; }
        
        .copyright {
  font-family: Arial, sans-serif; 
  font-size: 12px;
  color: #666;
  text-align: center;
}

<body>

    <div id="game-ui">
        <div>STABILITY: <span id="stability">100%</span></div>
        <div>MOVES LEFT: <span id="moves-left">40</span></div>
    </div>

    <div id="canvas-container">
        <div id="start-screen" class="overlay">
            <h1 style="font-family: 'Syncopate'; font-size: 24px; color: var(--accent);">NEURO-LINK</h1>
            <p class="sub-text">WORLD HARDEST PUZZLE ?</p>
            <button class="btn" onclick="game.start()">START</button>
        </div>

        <div id="out-menu" class="overlay hidden">
            <div class="critical-text">SYSTEM CRITICAL</div>
            <p class="sub-text">MAX MOVES REACHED. ALIGNMENT FAILED.</p>
            <button id="solve-btn-overlay" class="btn" onclick="game.triggerAutoSolve()">ACTIVATE AUTO-SOLVE</button>
            <button class="btn" style="font-size: 8px; border-color: #555; color: #888;" onclick="game.resetSequence()">RETRY SYSTEM</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls" class="button-row">
        <button class="btn" onclick="game.resetSequence()">RESET</button>
        <button id="solve-btn-main" class="btn" style="border-color: var(--gold); color: var(--gold);" onclick="game.toggleSolve()">AUTO-SOLVE</button>
    </div>

    <script>
        const sfx = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, type, dur, vol) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(f, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
        };

        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            grid: [],
            history: [],
            maxUserMoves: 40,
            userMovesUsed: 0,
            isSolving: false,
            shouldStop: false,

            start() {
                sfx.init();
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = 320; this.canvas.height = 320;
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('controls').classList.add('show');
                this.initSolvedGrid();
                this.loop();
                setTimeout(() => this.resetSequence(), 500);
            },

            initSolvedGrid() {
                this.grid = []; this.history = []; this.userMovesUsed = 0;
                this.isSolving = false; this.shouldStop = false;
                document.getElementById('out-menu').classList.add('hidden');
                for (let i = 0; i < 16; i++) {
                    this.grid.push({ r: Math.floor(i/4), c: i%4, angle: 0, targetAngle: 0 });
                }
                this.updateUI();
            },

            async resetSequence() {
                this.initSolvedGrid();
                await new Promise(r => setTimeout(r, 400));
                for (let i = 0; i < 20; i++) {
                    let randIndex = Math.floor(Math.random() * 16);
                    this.rotateNode(randIndex, true, true);
                    await new Promise(r => setTimeout(r, 60));
                }
                this.userMovesUsed = 0;
                this.updateUI();
            },

            triggerAutoSolve() {
                document.getElementById('out-menu').classList.add('hidden');
                this.autoSolveReverse();
            },

            toggleSolve() {
                if (this.isSolving) this.shouldStop = true;
                else this.autoSolveReverse();
            },

            async autoSolveReverse() {
                if (this.history.length === 0) return;
                this.isSolving = true; this.shouldStop = false;
                
                while (this.history.length > 0 && !this.shouldStop) {
                    let lastMoveIdx = this.history.pop();
                    this.applyRotation(lastMoveIdx, 270);
                    sfx.play(200, 'square', 0.1, 0.02);
                    await new Promise(res => setTimeout(res, 450));
                    this.updateUI();
                }
                this.isSolving = false;
                this.userMovesUsed = 0;
                this.updateUI();
            },

            rotateNode(index, silent = false, isScramble = false) {
                if (index < 0 || index >= 16 || this.isSolving) return;
                
                if (!isScramble && this.userMovesUsed >= this.maxUserMoves) return;

                this.history.push(index);
                this.applyRotation(index, 90);
                
                if (!silent) {
                    this.userMovesUsed++;
                    sfx.play(440, 'square', 0.1, 0.05);
                    this.updateUI();
                    
                    if (this.userMovesUsed >= this.maxUserMoves && !this.checkWin()) {
                        setTimeout(() => {
                            document.getElementById('out-menu').classList.remove('hidden');
                            sfx.play(100, 'sawtooth', 0.5, 0.1);
                        }, 800);
                    }
                }
            },

            applyRotation(index, amount) {
                const node = this.grid[index];
                node.targetAngle += amount;
                const neighbors = [index - 4, index + 4, index - 1, index + 1];
                neighbors.forEach(nIdx => {
                    if (this.grid[nIdx]) {
                        if (Math.abs(nIdx - index) === 1 && this.grid[nIdx].r !== node.r) return;
                        this.grid[nIdx].targetAngle += amount;
                    }
                });
            },

            checkWin() {
                return this.grid.every(n => (n.targetAngle % 360) === 0);
            },

            updateUI() {
                const correct = this.grid.filter(n => (n.targetAngle % 360) === 0).length;
                document.getElementById('stability').innerText = Math.floor((correct/16)*100) + "%";
                document.getElementById('moves-left').innerText = Math.max(0, this.maxUserMoves - this.userMovesUsed);
            },

            draw() {
                this.ctx.clearRect(0, 0, 320, 320);
                this.grid.forEach((n) => {
                    n.angle += (n.targetAngle - n.angle) * 0.12;
                    this.ctx.save();
                    this.ctx.translate(n.c * 80 + 40, n.r * 80 + 40);
                    this.ctx.rotate(n.angle * Math.PI / 180);
                    const active = (n.targetAngle % 360 === 0);
                    this.ctx.beginPath(); this.ctx.roundRect(-30, -30, 60, 60, 10);
                    this.ctx.fillStyle = active ? 'rgba(6, 182, 212, 0.25)' : '#111827';
                    this.ctx.fill();
                    this.ctx.strokeStyle = active ? '#06b6d4' : '#374151';
                    this.ctx.lineWidth = 2; this.ctx.stroke();
                    this.ctx.beginPath(); this.ctx.moveTo(0, -15); this.ctx.lineTo(0, 15);
                    this.ctx.moveTo(-15, 0); this.ctx.lineTo(15, 0);
                    this.ctx.strokeStyle = active ? '#fff' : '#4b5563';
                    this.ctx.stroke(); this.ctx.restore();
                });
            },

            loop() { this.draw(); requestAnimationFrame(() => this.loop()); }
        };

        game.canvas.addEventListener('mousedown', (e) => {
            const rect = game.canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (rect.width / 4));
            const row = Math.floor((e.clientY - rect.top) / (rect.height / 4));
            game.rotateNode(row * 4 + col);
        });
    </script>
