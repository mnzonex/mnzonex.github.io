<body>

    <!-- Navigation -->
    <header class="navbar navbar-scrolled">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">MN ZONEX<span> 2.0</span>

        </nav>
        <div class="mobile-menu-btn">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
    </header>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title" style="font-size: 56px;">Games Hub</h1>
            <p class="hero-subtitle" style="margin: 0 auto;">Enter the arena and challenge yourself with our instant
                game collection.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="cards-grid" id="games">
                <!-- AI Injected Content -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <div class="logo" style="margin-bottom: 20px;">MN ZONEX<span> 2.0</span></div>
            <p style="font-size: 13px; color: #555;">&copy; 2026 MN ZONEX. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        const games = [
            {
                name: "Snake Pro - 2026",
                desc: "The classic snake experience reimagined with modern graphics and smooth controls.",
                img: "assets/images/games/game1.jpg",
                link: "games/game1/snake-game.html"
            },
            {
                name: "NEURO-LINK",
                desc: "Override the system in this intense cyberpunk hacking simulation.",
                img: "assets/images/games/game2.jpg",
                link: "games/game2/neuro-link-game.html"
            },
            {
                name: "Dino Runner Pro",
                desc: "Run, jump, and survive in this pixel-perfect prehistoric endless runner.",
                img: "assets/images/games/game3.jpg",
                link: "games/game3/dino-game.html"
            },
            {
                name: "Circle Dash",
                desc: "Test your reflexes in this minimalist, fast-paced geometric challenge.",
                img: "assets/images/games/game4.jpg",
                link: "games/game4/circle-dash-game.html"
            },
            {
                name: "Doodle Jump - Master",
                desc: "Bounce higher and higher in this addictive, physics-based platformer.",
                img: "assets/images/games/game5.jpg",
                link: "games/game5/doodle-jump-game.html"
            },
            {
                name: "Brick Breaker",
                desc: "Classic arcade action: smash through colors and clear the board.",
                img: "assets/images/games/game6.jpg",
                link: "games/game6/brick-breaker-game.html"
            },
            {
                name: "Neon Penguin Fly",
                desc: "Fly through the glowing night sky in this vibrant neon adventure.",
                img: "assets/images/games/game7.jpg",
                link: "games/game7/neon-penguin-game.html"
            },
            {
                name: "Coming Soon...",
                desc: "New games are being developed. Stay tuned for the next excitement!",
                img: "assets/images/games/coming-soon.png",
                link: "#"
            }
        ];

        const container = document.getElementById("games");

        games.forEach((g, index) => {
            container.innerHTML += `
        <div class="game-card reveal-on-scroll" style="transition-delay: ${index * 0.1}s">
          <img src="${g.img}" alt="${g.name}" loading="lazy" onerror="this.src='assets/images/games/coming-soon.png'">
          <div class="game-info">
            <h4>${g.name}</h4>
            <p>${g.desc}</p>
            <a href="${g.link}" class="game-btn">Play Now <i class="fa-solid fa-play" style="font-size: 10px; margin-left: 5px;"></i></a>
          </div>
        </div>
      `;
        });
    </script>
</body>
