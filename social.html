                platforms.</p>

        <div class="container">

                <!-- AI Injected Content -->

        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        const socials = [
            { name: "Facebook", icon: "fa-brands fa-facebook-f", link: "https://facebook.com" },
            { name: "Twitter", icon: "fa-brands fa-twitter", link: "https://twitter.com" },
            { name: "Instagram", icon: "fa-brands fa-instagram", link: "https://instagram.com" },
            { name: "LinkedIn", icon: "fa-brands fa-linkedin-in", link: "https://linkedin.com" },
            { name: "YouTube", icon: "fa-brands fa-youtube", link: "https://youtube.com" },
            { name: "Telegram", icon: "fa-brands fa-telegram", link: "https://t.me" },
            { name: "WhatsApp", icon: "fa-brands fa-whatsapp", link: "https://wa.me" },
            { name: "Discord", icon: "fa-brands fa-discord", link: "https://discord.com" }
        ];

        const container = document.getElementById("social-container");

        socials.forEach((s, index) => {
            container.innerHTML += `
        <a href="${s.link}" target="_blank" class="social-card reveal-on-scroll" style="transition-delay: ${index * 0.1}s">
          <i class="${s.icon}"></i>
          <span style="font-weight: 600; color: #fff;">${s.name}</span>
        </a>
      `;
        });
    </script>
