            padding: 150px 0 60px;
            text-align: center;

        }

<body>

    <!-- Navigation -->
    <header class="navbar navbar-scrolled">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">MN ZONEX<span> 2.0</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="services.html">Services</a>
            <a href="business.html">Business</a>

            <a href="social.html">Social</a>
            <a href="tools.html">Tools</a>
            <a href="feedback.html" class="active">Feedback</a>
        </nav>
        <div class="mobile-menu-btn">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
    </header>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title" style="font-size: 56px;">Community Feedback</h1>
            <p class="hero-subtitle" style="margin: 0 auto 30px;">Hear what our users have to say about the MN ZONEX
                experience.</p>
            <button class="btn btn-pulse" onclick="window.location.href='add-feedback.html'">Share Your
                Thoughts</button>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div id="feedback-container">
                <!-- AI Injected Content -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <div class="logo" style="margin-bottom: 20px;">MN ZONEX<span> 2.0</span></div>
            <p style="font-size: 13px; color: #555;">&copy; 2026 MN ZONEX. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        const feedbacks = [
            { name: "Alex Johnson", text: "Very clean and professional website. The transition to 2.0 is incredible!", rating: 5, color: "var(--primary)" },
            { name: "Ravi Kumar", text: "Animations are smooth. Love the dark theme and the new glassmorphism effects.", rating: 5, color: "#ff00cc" },
            { name: "Sophia Wei", text: "Easy to navigate and visually appealing. The tools section is a lifesaver.", rating: 4, color: "#7000ff" },
            { name: "Liam Smith", text: "The services section is very helpful and well-organized. Great job!", rating: 5, color: "#00ff88" },
            { name: "Noah Miller", text: "Website loads fast and looks amazing on my mobile device. Highly recommended.", rating: 5, color: "#ffaa00" }
        ];

        const container = document.getElementById("feedback-container");

        feedbacks.forEach((f, index) => {
            let stars = "";
            for (let i = 0; i < 5; i++) {
                stars += `<i class="fa-solid fa-star" style="color: ${i < f.rating ? 'gold' : '#333'}"></i>`;
            }

            container.innerHTML += `
        <div class="feedback-card reveal-on-scroll" style="transition-delay: ${index * 0.1}s">
          <div class="feedback-header">
            <div class="avatar" style="background: ${f.color}"></div>
            <div>
              <h4 style="margin: 0;">${f.name}</h4>
              <div style="font-size: 12px; margin-top: 5px;">${stars}</div>
            </div>
          </div>
          <p>"${f.text}"</p>
        </div>
      `;
        });
    </script>
</body>
