    <style>
        .page-header {
            padding: 150px 0 60px;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, var(--primary-glow), transparent 70%);
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        textarea.form-control {
            height: 150px;
            resize: none;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <header class="navbar navbar-scrolled">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">MN ZONEX<span> 2.0</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="services.html">Services</a>
            <a href="business.html">Business</a>
            <a href="network.html">Releases</a>
            <a href="social.html">Social</a>
            <a href="tools.html">Tools</a>
            <a href="feedback.html">Feedback</a>
        </nav>
        <div class="mobile-menu-btn">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
    </header>

    <header class="page-header">
        <div class="container">
            <h1 class="hero-title" style="font-size: 56px;">Your Thoughts</h1>
            <p class="hero-subtitle" style="margin: 0 auto;">Help us define the future of MN ZONEX with your valuable
                feedback.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="form-container reveal-on-scroll">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="user-name" class="form-control" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Feedback Message</label>
                    <textarea id="user-feedback" class="form-control" placeholder="What's on your mind?"></textarea>
                </div>
                <div class="form-group">
                    <label>Rating</label>
                    <div id="rating-stars" style="font-size: 24px; color: #333; cursor: pointer;">
                        <i class="fa-solid fa-star" data-value="1"></i>
                        <i class="fa-solid fa-star" data-value="2"></i>
                        <i class="fa-solid fa-star" data-value="3"></i>
                        <i class="fa-solid fa-star" data-value="4"></i>
                        <i class="fa-solid fa-star" data-value="5"></i>
                    </div>
                </div>
                <button id="submit-feedback" class="btn" style="width: 100%;">Submit Feedback <i
                        class="fa-solid fa-paper-plane" style="margin-left: 10px;"></i></button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <div class="logo" style="margin-bottom: 20px;">MN ZONEX<span> 2.0</span></div>
            <p style="font-size: 13px; color: #555;">&copy; 2026 MN ZONEX. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        // Rating logic
        let currentRating = 0;
        const stars = document.querySelectorAll('#rating-stars i');

        stars.forEach(star => {
            star.addEventListener('mouseover', function () {
                const val = this.dataset.value;
                highlightStars(val);
            });

            star.addEventListener('mouseleave', function () {
                highlightStars(currentRating);
            });

            star.addEventListener('click', function () {
                currentRating = this.dataset.value;
                highlightStars(currentRating);
            });
        });

        function highlightStars(val) {
            stars.forEach(star => {
                if (star.dataset.value <= val) {
                    star.style.color = 'gold';
                } else {
                    star.style.color = '#333';
                }
            });
        }

        // Submit logic
        document.getElementById("submit-feedback").addEventListener("click", () => {
            const name = document.getElementById("user-name").value.trim();
            const msg = document.getElementById("user-feedback").value.trim();

            if (!name || !msg || currentRating === 0) {
                alert("Please complete all fields and provide a rating!");
                return;
            }

            alert("Thank you " + name + "! Your feedback has been received.");
            window.location.href = 'feedback.html';
        });
    </script>
</body>

</html>
